<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塗料在庫管理</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f0f4ff;min-height:100vh;}
#app{max-width:640px;margin:0 auto;min-height:100vh;background:#fff;position:relative;}
.header{background:#1a2744;color:#fff;padding:16px;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.header-title{font-size:18px;font-weight:600;}
.header-sub{font-size:11px;color:#93c5fd;letter-spacing:0.08em;margin-top:2px;}
.sync-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.sync-btn{padding:7px 14px;border-radius:8px;border:none;background:#2563eb;color:#fff;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.sync-btn:disabled{opacity:0.5;cursor:not-allowed;}
.sync-btn.green{background:#059669;}
.sync-status{font-size:11px;color:#93c5fd;margin-top:6px;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;}
.stat-card{background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.15);border-radius:8px;padding:10px 12px;}
.stat-value{font-size:18px;font-weight:600;line-height:1;}
.stat-label{font-size:10px;color:#93c5fd;margin-top:3px;}
.tabs{display:flex;background:#f9fafb;border-bottom:1px solid #e5e7eb;overflow-x:auto;}
.tab{flex:1;min-width:80px;padding:10px 8px;font-size:13px;font-weight:500;color:#6b7280;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:4px;}
.tab.active{color:#2563eb;border-bottom-color:#2563eb;}
.body{padding:12px;}
.search-bar{display:flex;gap:8px;margin-bottom:10px;}
.search-bar input{flex:1;font-size:14px;padding:8px 12px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;color:#111;}
.add-btn{padding:8px 14px;border-radius:8px;border:none;background:#2563eb;color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.filter-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px;margin-bottom:10px;scrollbar-width:none;}
.filter-chips::-webkit-scrollbar{display:none;}
.chip{padding:4px 12px;border-radius:20px;border:1px solid #e5e7eb;background:#fff;color:#6b7280;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;}
.chip.active{background:#2563eb;border-color:#2563eb;color:#fff;}
.alert-bar{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;font-size:13px;color:#92400e;}
.alert-bar button{margin-left:auto;background:none;border:none;color:#92400e;cursor:pointer;font-size:16px;}
.paint-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:14px;margin-bottom:10px;}
.paint-card.warn{border-color:#fca5a5;}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
.card-left{flex:1;min-width:0;}
.card-right{text-align:right;flex-shrink:0;}
.paint-name{font-size:14px;font-weight:600;color:#111;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.paint-meta{font-size:12px;color:#6b7280;}
.remaining-value{font-size:22px;font-weight:700;line-height:1;color:#111;}
.remaining-value.danger{color:#ef4444;}
.remaining-sub{font-size:11px;color:#9ca3af;margin-top:2px;}
.badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px;}
.badge{padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;}
.b-外壁用{background:#dbeafe;color:#1e40af}.b-内壁用{background:#ede9fe;color:#5b21b6}.b-木部用{background:#fef3c7;color:#92400e}.b-鉄部用{background:#fee2e2;color:#991b1b}.b-屋根用{background:#d1fae5;color:#065f46}.b-その他{background:#f3f4f6;color:#374151}
.b-未開封{background:#d1fae5;color:#065f46}.b-使用中{background:#fef3c7;color:#92400e}.b-残量少{background:#fee2e2;color:#991b1b}.b-廃棄予定{background:#f3f4f6;color:#374151}
.bar-wrap{margin:6px 0;}
.bar-label{display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;margin-bottom:3px;}
.bar-track{height:6px;background:#f3f4f6;border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.location-row{font-size:12px;color:#9ca3af;display:flex;align-items:center;gap:4px;margin-bottom:6px;}
.memo-box{background:#f9fafb;border-radius:8px;padding:6px 10px;font-size:12px;color:#6b7280;border-left:2px solid #e5e7eb;margin-bottom:8px;}
.card-actions{display:flex;gap:6px;}
.btn-edit{padding:5px 14px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;color:#374151;font-size:12px;font-weight:500;cursor:pointer;}
.btn-update{padding:5px 14px;border-radius:8px;border:none;background:#2563eb;color:#fff;font-size:12px;font-weight:600;cursor:pointer;}
.btn-del{padding:5px 10px;border-radius:8px;border:1px solid #fca5a5;background:#fff;color:#ef4444;font-size:12px;cursor:pointer;margin-left:auto;}
.empty{text-align:center;padding:48px 16px;color:#9ca3af;font-size:14px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:50;}
.modal{background:#fff;border-radius:12px 12px 0 0;padding:20px 16px;width:100%;max-width:640px;max-height:85vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;background:#e5e7eb;border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;color:#111;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;font-weight:600;color:#6b7280;letter-spacing:0.06em;margin-bottom:4px;}
.field input,.field select,.field textarea{width:100%;font-size:14px;padding:8px 12px;border-radius:8px;border:1px solid #e5e7eb;background:#f9fafb;color:#111;}
.field textarea{resize:vertical;min-height:60px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.modal-cancel{flex:1;padding:10px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;color:#374151;font-size:14px;cursor:pointer;}
.modal-save{flex:2;padding:10px;border-radius:8px;border:none;background:#2563eb;color:#fff;font-size:14px;font-weight:600;cursor:pointer;}
.update-modal{background:#fff;border-radius:12px 12px 0 0;padding:20px 16px;width:100%;max-width:400px;}
.slider-display{text-align:center;font-size:36px;font-weight:700;color:#111;margin:12px 0 4px;}
.slider-sub{text-align:center;font-size:13px;color:#6b7280;margin-bottom:12px;}
.warehouse-section{margin-bottom:20px;}
.warehouse-title{font-size:14px;font-weight:600;color:#111;padding:8px 0;border-bottom:1px solid #e5e7eb;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.log-item{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid #f3f4f6;font-size:13px;}
.log-dot{width:8px;height:8px;border-radius:50%;margin-top:4px;flex-shrink:0;}
.log-time{font-size:11px;color:#9ca3af;margin-top:2px;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a2744;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:100;white-space:nowrap;transition:opacity 0.3s;pointer-events:none;}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-title"><i class="ti ti-droplet"></i> 塗料在庫管理</div>
        <div class="header-sub">本社 / 第二工場 / 第三工場</div>
      </div>
      <div class="sync-row">
        <button class="sync-btn green" onclick="syncToSheet()"><i class="ti ti-cloud-upload"></i> 保存</button>
        <button class="sync-btn" onclick="loadFromSheet()"><i class="ti ti-refresh"></i> 再読込</button>
      </div>
    </div>
    <div id="sync-status" class="sync-status">接続先: Googleスプレッドシート</div>
    <div class="stats-grid" id="stats"></div>
  </div>
  <div class="tabs">
    <button class="tab active" data-tab="list" onclick="switchTab('list')"><i class="ti ti-list"></i> 在庫一覧</button>
    <button class="tab" data-tab="warehouse" onclick="switchTab('warehouse')"><i class="ti ti-building-warehouse"></i> 倉庫別</button>
    <button class="tab" data-tab="log" onclick="switchTab('log')"><i class="ti ti-history"></i> 更新ログ</button>
  </div>
  <div class="body">
    <div id="tab-list">
      <div class="search-bar">
        <input type="text" placeholder="塗料名・色・メーカーで検索..." id="search-input" oninput="render()">
        <button class="add-btn" onclick="openAdd()"><i class="ti ti-plus"></i> 登録</button>
      </div>
      <div class="filter-chips" id="filter-chips"></div>
      <div id="alert-area"></div>
      <div id="result-count" style="font-size:12px;color:#9ca3af;margin-bottom:8px;"></div>
      <div id="list-container"></div>
    </div>
    <div id="tab-warehouse" style="display:none;"></div>
    <div id="tab-log" style="display:none;"></div>
  </div>
  <div id="modal-area"></div>
</div>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbyL59WPHQaqxHV3WXN_bAr_xizLevgKtSnHtGTOzO7KWc4dic6RqFFzvJyYM3ZAhxw/exec';
let paints=[
  {id:1,name:'日本ペイント ファインシリコンフレッシュ',maker:'日本ペイント',color:'ホワイト',type:'外壁用',size:15,qty:3,used:0,loc:'倉庫A',site:'本社',status:'未開封',date:'2026-05-01',memo:''},
  {id:2,name:'関西ペイント アレスダイナミックTOP',maker:'関西ペイント',color:'クリーム',type:'外壁用',size:15,qty:1,used:40,loc:'倉庫A',site:'本社',status:'使用中',date:'2026-04-15',memo:'田中邸 残り60%'},
  {id:3,name:'エスケー化研 水性セラタイトF',maker:'エスケー化研',color:'ライトグレー',type:'外壁用',size:15,qty:2,used:0,loc:'倉庫B',site:'第二工場',status:'未開封',date:'2026-05-10',memo:''},
  {id:4,name:'日本ペイント 水性ケンエース',maker:'日本ペイント',color:'オフホワイト',type:'内壁用',size:15,qty:1,used:70,loc:'現場',site:'第三工場',status:'使用中',date:'2026-05-08',memo:'鈴木邸使用中 残り30%'},
  {id:5,name:'関西ペイント カンペパピオ',maker:'関西ペイント',color:'ベージュ',type:'木部用',size:7,qty:4,used:0,loc:'倉庫A',site:'本社',status:'未開封',date:'2026-04-20',memo:''},
  {id:6,name:'日本ペイント 1液ファインウレタン',maker:'日本ペイント',color:'ブラック',type:'鉄部用',size:7,qty:1,used:85,loc:'倉庫B',site:'第二工場',status:'残量少',date:'2026-03-10',memo:'残量わずか 要確認'},
  {id:7,name:'エスケー化研 クリーンマイルドシリコン',maker:'エスケー化研',color:'ホワイト',type:'外壁用',size:15,qty:2,used:50,loc:'現場',site:'第三工場',status:'使用中',date:'2026-05-05',memo:'山田邸 約半分使用'},
];
let logs=[
  {time:'2026-05-28 09:12',user:'田中（現場）',action:'残量更新',name:'関西ペイント アレスダイナミックTOP',detail:'使用率 20% → 40%',type:'update'},
  {time:'2026-05-27 17:30',user:'鈴木（事務）',action:'新規登録',name:'エスケー化研 水性セラタイトF',detail:'2缶 第二工場に入庫',type:'add'},
];
let activeFilter='すべて',activeTab='list';
const SITES=['すべて','本社','第二工場','第三工場'];
function remaining(p){return((p.qty*p.size)*(1-p.used/100)).toFixed(1);}
function nowStr(){return new Date().toLocaleString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}).replace(/\//g,'-');}
function showToast(msg,color){
  const t=document.createElement('div');t.className='toast';t.style.background=color||'#1a2744';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},2500);
}
function loadFromSheet(){
  document.getElementById('sync-status').textContent='読み込み中...';
  const SHEET_ID='1GBrTI_y_dj7tfAycZRBajb9bFe_VnfDYqVRbFZ0U3Mo';
  const url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/gviz/tq?tqx=out:json&sheet=塗料在庫';
  fetch(url)
    .then(r=>r.text())
    .then(text=>{
      const json=JSON.parse(text.replace(/^[^{]*{/,'{').replace(/}[^}]*$/,'}'));
      const cols=json.table.cols.map(c=>c.label);
      const rows=json.table.rows;
      if(!rows||rows.length===0){
        document.getElementById('sync-status').textContent='シートにデータなし';
        render();return;
      }
      paints=rows.map(r=>{
        const v=r.c;
        const get=(i)=>v[i]&&v[i].v!==null?v[i].v:'';
        return {
          id:Number(get(0))||Date.now(),
          name:String(get(1)||''),
          maker:String(get(2)||''),
          color:String(get(3)||''),
          type:String(get(4)||'外壁用'),
          size:parseFloat(get(5))||15,
          qty:parseInt(get(6))||1,
          used:parseInt(get(7))||0,
          loc:String(get(9)||''),
          site:String(get(10)||'本社'),
          status:String(get(11)||'未開封'),
          date:String(get(12)||''),
          memo:String(get(13)||''),
        };
      });
      document.getElementById('sync-status').textContent='最終読込: '+nowStr();
      showToast('✅ スプレッドシートから読み込みました','#065f46');
      render();
    })
    .catch(e=>{
      document.getElementById('sync-status').textContent='オフライン — ローカルデータ表示中';
      showToast('⚠️ 接続できませんでした','#92400e');
      render();
    });
}
async function syncToSheet(){
  const btn=event&&event.target?event.target:document.querySelector('.sync-btn.green');
  if(btn){btn.disabled=true;btn.innerHTML='<i class="ti ti-loader"></i> 保存中...';}
  try{
    const rows=paints.map(p=>({'ID':p.id,'塗料名':p.name,'メーカー':p.maker,'色':p.color,'用途':p.type,'容量(L)':p.size,'数量':p.qty,'使用率(%)':p.used,'残量(L)':remaining(p),'保管場所':p.loc,'現場名':p.site,'ステータス':p.status,'登録日':p.date,'メモ':p.memo}));
    await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'save',paints:rows})});
    document.getElementById('sync-status').textContent='最終保存: '+nowStr();
    showToast('✅ シートに保存しました','#065f46');
  }catch(e){showToast('⚠️ 保存に失敗しました','#991b1b');}
  if(btn){btn.disabled=false;btn.innerHTML='<i class="ti ti-cloud-upload"></i> 保存';}
}
function switchTab(tab){
  activeTab=tab;
  ['list','warehouse','log'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'':'none';
    document.querySelector(`[data-tab="${t}"]`).classList.toggle('active',t===tab);
  });
  if(tab==='warehouse')renderWarehouse();
  if(tab==='log')renderLog();
}
function renderStats(){
  const totalL=paints.reduce((s,p)=>s+parseFloat(remaining(p)),0);
  const low=paints.filter(p=>p.status==='残量少').length;
  const inUse=paints.filter(p=>p.status==='使用中').length;
  const sealed=paints.filter(p=>p.status==='未開封').length;
  document.getElementById('stats').innerHTML=[
    {icon:'ti-droplet-half',val:totalL.toFixed(1)+'L',label:'総残量'},
    {icon:'ti-package',val:sealed+'缶',label:'未開封'},
    {icon:'ti-brush',val:inUse+'缶',label:'使用中'},
    {icon:'ti-alert-triangle',val:low+'缶',label:'残量少'},
  ].map(s=>`<div class="stat-card"><i class="ti ${s.icon}" style="font-size:16px;margin-bottom:4px;display:block;"></i><div class="stat-value">${s.val}</div><div class="stat-label">${s.label}</div></div>`).join('');
}
function renderChips(){
  document.getElementById('filter-chips').innerHTML=SITES.map(s=>`<button class="chip${activeFilter===s?' active':''}" onclick="setFilter('${s}')">${s}</button>`).join('');
}
function setFilter(s){activeFilter=s;render();}
function render(){
  renderStats();renderChips();
  const q=document.getElementById('search-input').value.toLowerCase();
  const filtered=paints.filter(p=>{
    const mq=!q||p.name.toLowerCase().includes(q)||p.color.toLowerCase().includes(q)||p.maker.toLowerCase().includes(q);
    const ms=activeFilter==='すべて'||p.site===activeFilter;
    return mq&&ms;
  });
  const low=paints.filter(p=>p.status==='残量少').length;
  document.getElementById('alert-area').innerHTML=low>0?`<div class="alert-bar"><i class="ti ti-alert-triangle"></i> 残量少が ${low} 缶あります <button onclick="this.parentElement.remove()">×</button></div>`:'';
  document.getElementById('result-count').textContent=`${filtered.length} 件`;
  document.getElementById('list-container').innerHTML=filtered.length===0
    ?'<div class="empty"><i class="ti ti-bucket-off" style="font-size:32px;display:block;margin-bottom:8px;"></i>該当する塗料が見つかりません</div>'
    :filtered.map(p=>paintCard(p)).join('');
}
function barColor(r){return r>50?'#22c55e':r>20?'#f59e0b':'#ef4444';}
function paintCard(p){
  const rem=100-p.used;const remL=remaining(p);const isDanger=parseFloat(remL)<5;
  return `<div class="paint-card${p.status==='残量少'?' warn':''}">
    <div class="card-top">
      <div class="card-left">
        <div class="badges"><span class="badge b-${p.type}">${p.type}</span><span class="badge b-${p.status}">${p.status}</span></div>
        <div class="paint-name">${p.name}</div>
        <div class="paint-meta">${p.color} · ${p.maker}</div>
      </div>
      <div class="card-right">
        <div class="remaining-value${isDanger?' danger':''}">${remL}L</div>
        <div class="remaining-sub">${p.qty}缶×${p.size}L</div>
      </div>
    </div>
    <div class="location-row"><i class="ti ti-map-pin" style="font-size:13px;"></i>${p.site} / ${p.loc}</div>
    <div class="bar-wrap">
      <div class="bar-label"><span>残量</span><span>${rem}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${rem}%;background:${barColor(rem)};"></div></div>
    </div>
    ${p.memo?`<div class="memo-box"><i class="ti ti-message-circle" style="font-size:12px;"></i> ${p.memo}</div>`:''}
    <div class="card-actions">
      <button class="btn-update" onclick="openUpdate(${p.id})"><i class="ti ti-refresh"></i> 残量更新</button>
      <button class="btn-edit" onclick="openEdit(${p.id})"><i class="ti ti-edit"></i> 編集</button>
      <button class="btn-del" onclick="deletePaint(${p.id})"><i class="ti ti-trash"></i></button>
    </div>
  </div>`;
}
function renderWarehouse(){
  document.getElementById('tab-warehouse').innerHTML=['本社','第二工場','第三工場'].map(site=>{
    const items=paints.filter(p=>p.site===site);
    const totalL=items.reduce((s,p)=>s+parseFloat(remaining(p)),0);
    return `<div class="warehouse-section">
      <div class="warehouse-title"><i class="ti ti-building-warehouse"></i>${site}<span style="font-size:11px;color:#9ca3af;font-weight:400;margin-left:6px;">${items.length}アイテム · ${totalL.toFixed(1)}L</span></div>
      ${items.length===0?'<div style="font-size:13px;color:#9ca3af;padding:12px 0;">在庫なし</div>':items.map(p=>paintCard(p)).join('')}
    </div>`;
  }).join('');
}
function renderLog(){
  document.getElementById('tab-log').innerHTML=`
    <div style="font-size:13px;color:#9ca3af;margin-bottom:12px;">直近の操作履歴</div>
    ${logs.map(l=>{
      const dot=l.type==='warn'?'#f59e0b':l.type==='add'?'#22c55e':'#3b82f6';
      return `<div class="log-item"><div class="log-dot" style="background:${dot};"></div><div style="flex:1;"><div style="color:#111;">${l.action} — ${l.name}</div><div style="color:#6b7280;font-size:12px;">${l.detail}</div><div class="log-time">${l.time} · ${l.user}</div></div></div>`;
    }).join('')}`;
}
function openUpdate(id){
  const p=paints.find(x=>x.id===id);
  document.getElementById('modal-area').innerHTML=`
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="update-modal" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-title"><i class="ti ti-refresh"></i> 残量更新</div>
        <div style="font-size:14px;font-weight:600;color:#111;margin-bottom:2px;">${p.name}</div>
        <div style="font-size:12px;color:#6b7280;margin-bottom:12px;">${p.site} / ${p.loc}</div>
        <div class="slider-display" id="upd-pct">${100-p.used}%</div>
        <div class="slider-sub" id="upd-L">残量 ${remaining(p)}L</div>
        <input type="range" min="0" max="100" step="5" value="${100-p.used}" id="upd-slider" style="width:100%;margin:8px 0;" oninput="updSlider(${p.qty},${p.size},this.value)">
        <div style="display:flex;justify-content:space-between;font-size:11px;color:#9ca3af;margin-bottom:12px;"><span>0%（空）</span><span>100%（満缶）</span></div>
        <div class="field"><label>担当者名</label><input type="text" id="upd-user" placeholder="例: 田中（現場）"></div>
        <div class="field"><label>メモ（任意）</label><input type="text" id="upd-memo" value="${p.memo}" placeholder="現場状況など"></div>
        <div class="modal-actions">
          <button class="modal-cancel" onclick="document.getElementById('modal-area').innerHTML=''">キャンセル</button>
          <button class="modal-save" onclick="saveUpdate(${p.id})">更新してシートに保存</button>
        </div>
      </div>
    </div>`;
}
function updSlider(qty,size,val){
  document.getElementById('upd-pct').textContent=val+'%';
  document.getElementById('upd-L').textContent='残量 '+((qty*size)*(val/100)).toFixed(1)+'L';
}
function saveUpdate(id){
  const val=parseInt(document.getElementById('upd-slider').value);
  const memo=document.getElementById('upd-memo').value;
  const user=document.getElementById('upd-user').value||'不明';
  const p=paints.find(x=>x.id===id);
  const oldUsed=p.used;
  p.used=100-val;p.memo=memo;
  if(val<=15)p.status='残量少';else if(val<100)p.status='使用中';else p.status='未開封';
  logs.unshift({time:nowStr(),user,action:'残量更新',name:p.name,detail:`使用率 ${oldUsed}% → ${p.used}%`,type:'update'});
  document.getElementById('modal-area').innerHTML='';
  render();syncToSheet();
}
function openAdd(){showForm(null);}
function openEdit(id){showForm(paints.find(x=>x.id===id));}
function showForm(p){
  const isNew=!p;
  const f=p||{name:'',maker:'',color:'',type:'外壁用',size:15,qty:1,used:0,loc:'倉庫A',site:'本社',status:'未開封',memo:''};
  document.getElementById('modal-area').innerHTML=`
    <div class="modal-overlay" onclick="closeModal(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-title">${isNew?'<i class="ti ti-plus"></i> 新規塗料登録':'<i class="ti ti-edit"></i> 塗料情報を編集'}</div>
        <div class="field"><label>塗料名</label><input type="text" id="f-name" value="${f.name}" placeholder="例: 日本ペイント ファインシリコン"></div>
        <div class="field-row">
          <div class="field"><label>メーカー</label><input type="text" id="f-maker" value="${f.maker}"></div>
          <div class="field"><label>色</label><input type="text" id="f-color" value="${f.color}"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>用途</label><select id="f-type">${['外壁用','内壁用','木部用','鉄部用','屋根用','その他'].map(t=>`<option${t===f.type?' selected':''}>${t}</option>`).join('')}</select></div>
          <div class="field"><label>ステータス</label><select id="f-status">${['未開封','使用中','残量少','廃棄予定'].map(s=>`<option${s===f.status?' selected':''}>${s}</option>`).join('')}</select></div>
        </div>
        <div class="field-row3">
          <div class="field"><label>数量（缶）</label><input type="number" id="f-qty" value="${f.qty}" min="1"></div>
          <div class="field"><label>容量（L）</label><input type="number" id="f-size" value="${f.size}"></div>
          <div class="field"><label>使用済（%）</label><input type="number" id="f-used" value="${f.used}" min="0" max="100"></div>
        </div>
        <div class="field-row">
          <div class="field"><label>保管場所</label><input type="text" id="f-loc" value="${f.loc}" placeholder="倉庫A など"></div>
          <div class="field"><label>拠点</label><select id="f-site">${['本社','第二工場','第三工場'].map(s=>`<option${s===f.site?' selected':''}>${s}</option>`).join('')}</select></div>
        </div>
        <div class="field"><label>メモ</label><textarea id="f-memo">${f.memo}</textarea></div>
        <div class="modal-actions">
          <button class="modal-cancel" onclick="document.getElementById('modal-area').innerHTML=''">キャンセル</button>
          <button class="modal-save" onclick="saveForm(${isNew?'null':f.id})">${isNew?'登録してシートに保存':'保存する'}</button>
        </div>
      </div>
    </div>`;
}
function saveForm(id){
  const get=i=>document.getElementById(i).value;
  const data={name:get('f-name'),maker:get('f-maker'),color:get('f-color'),type:get('f-type'),status:get('f-status'),qty:parseInt(get('f-qty')),size:parseFloat(get('f-size')),used:parseInt(get('f-used')),loc:get('f-loc'),site:get('f-site'),memo:get('f-memo')};
  if(!data.name.trim()){alert('塗料名を入力してください');return;}
  if(id===null){
    data.id=Date.now();data.date=new Date().toISOString().slice(0,10);
    paints.push(data);
    logs.unshift({time:nowStr(),user:'事務所',action:'新規登録',name:data.name,detail:`${data.qty}缶 ${data.site}に登録`,type:'add'});
  }else{
    const idx=paints.findIndex(p=>p.id===id);
    paints[idx]={...paints[idx],...data};
    logs.unshift({time:nowStr(),user:'事務所',action:'情報更新',name:data.name,detail:'詳細情報を更新',type:'update'});
  }
  document.getElementById('modal-area').innerHTML='';
  render();
  if(activeTab==='warehouse')renderWarehouse();
  syncToSheet();
}
function deletePaint(id){
  const p=paints.find(x=>x.id===id);
  if(!confirm(`「${p.name}」を削除しますか？`))return;
  logs.unshift({time:nowStr(),user:'事務所',action:'削除',name:p.name,detail:'在庫から削除',type:'warn'});
  paints=paints.filter(x=>x.id!==id);
  render();syncToSheet();
}
function closeModal(e){if(e.target.classList.contains('modal-overlay'))document.getElementById('modal-area').innerHTML='';}
render();
loadFromSheet();
</script>
</body>
</html>
